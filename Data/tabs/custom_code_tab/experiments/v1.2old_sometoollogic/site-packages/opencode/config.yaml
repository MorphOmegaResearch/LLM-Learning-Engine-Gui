agentic:
  auto_handoff_enabled: false
  confirmation_level: MODERATE
  enabled: true
  resource_constraints: STANDARD
history:
  file_path: .opencode_history
  max_entries: 100
  save_to_file: true
interface:
  auto_save: false
  compact_mode: false
  confirm_destructive: true
  interactive_mode: true
  syntax_highlighting: true
model:
  base_url: http://localhost:11434
  max_tokens: 4096
  name: gemma2:2b
  temperature: 0.1
optimization:
  adaptive_timeouts: true
  context_scoring: true
  dynamic_pruning: true
  enabled: true
  max_context_tokens: 2000
  performance_monitoring: true
  pruning_ratio: 0.8
quality_recovery:
  enabled: false
  instant_hooks_enabled: true
  mode: balanced
  observer_pattern_enabled: true
  rag_feedback_enabled: true
routing:
  continuation_threshold: 0.8
  enabled: true
  use_mvco_router: true
  lane_timeouts:
    deliberate: 25
    recall: 5
    standard: 12
    tool_use: 15
  performance_targets:
    general: 80.0
    recall: 95.0
    structured: 90.0
  reasoning_threshold: 0.6
  recall_threshold: 0.8
  structured_threshold: 0.7
  tool_threshold: 0.7
runtime:
  auto_detect: true
  cpu_threads: null
  fallback_model: gemma2:2b-16k
  gpu_enabled: false
  max_memory_mb: null
  resources: 50
  slice_generation: true
system_prompt: 'You are OpenCode, an AI-powered code assistant. You help users with
  software development tasks including:

  - Code generation and refactoring

  - Bug fixes and debugging

  - Code analysis and explanation

  - Project structure understanding

  - File operations and editing


  You have access to various tools to interact with the file system, execute commands,
  and search code.

  Be concise, accurate, and helpful. Always consider security best practices.

  '
tools:
  bash:
    allowed_commands:
    - git
    - npm
    - pip
    - python
    - node
    - cargo
    - go
    - make
    - docker
    timeout: 30
  enabled:
  - file_read
  - file_write
  - file_edit
  - bash_execute
  - grep_search
  - git_operations
