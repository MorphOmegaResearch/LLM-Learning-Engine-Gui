key: 313452
doi: 10.48580/dgvqq
title: Catalogue of Life
alias: COL25.12
description: "The Catalogue of Life is an assembly of expert-based global species\
  \ checklists with the aim to build a comprehensive catalogue of all known species\
  \ of organisms on Earth. \nContinuous progress is made towards completion, but for\
  \ now, it probably includes just over 80% of the world’s known species. \nThe Catalogue\
  \ of Life estimates 2.3M extant species on the planet recognised by taxonomists\
  \ at present time. \nThis means that for many groups it continues to be deficient,\
  \ and users may notice that many species are still missing from the Catalogue.\n\
  \n### What's new in December 2025 edition?  \n\n#### New global checklist:\n * Mycetophagidae\
  \ family has been added to Háva's catalogue of selected Coleoptera families.\n\n\
  #### 90 checklists have been updated:\n \n * 3i Auchenorrhyncha\n * Entiminae\n\
  \ * FishBase via Aphia at VLIZ\n * Gelechiidae\n * GLI\n * Scarabs\n * Sesiidae\n\
  \ * SF Aphid\n * SF Chrysididae\n * SF Coreoidea\n * SF Dermaptera\n * SF Embioptera\n\
  \ * SF Isoptera\n * SF Lygaeoidea\n * SF Mantodea     \n * SF Orthoptera\n * SF\
  \ Phasmida\n * SF Plecoptera\n * SF Psocodea\n * Systema Dipterorum\n * WCO\n *\
  \ WOL\n * World Ferns\n * World Plants\n * WoRMS, 66 checklists"
