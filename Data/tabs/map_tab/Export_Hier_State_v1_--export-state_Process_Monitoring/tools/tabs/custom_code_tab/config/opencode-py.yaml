model:
  name: "gemma2:2b"
  base_url: "http://localhost:11434"
  temperature: 0.7
  max_tokens: 4096

system_prompt: |
  You are OpenCode, an AI-powered code assistant. You help users with software development tasks including:
  - Code generation and refactoring
  - Bug fixes and debugging
  - Code analysis and explanation
  - Project structure understanding
  - File operations and editing

  You have access to various tools to interact with the file system, execute commands, and search code.
  Be concise, accurate, and helpful. Always consider security best practices.

tools:
  enabled:
    - file_read
    - file_write
    - file_edit
    - bash_execute
    - grep_search
    - git_operations

  # Security: All file operations are restricted to the current working directory
  # This prevents access to files outside the project directory
  restrict_to_working_dir: true

  bash:
    allowed_commands:
      - git
      - npm
      - pip
      - python
      - node
      - cargo
      - go
      - make
      - docker
    timeout: 30
    # Commands are executed within the working directory only

interface:
  interactive_mode: true
  syntax_highlighting: true
  auto_save: false
  confirm_destructive: true

history:
  max_entries: 100
  save_to_file: true
  file_path: ".opencode_history"